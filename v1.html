<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 420px;
      margin: 120px auto;
      background: white;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 {
      margin-bottom: 24px;
      color: #1e2a3a;
    }
    input {
      width: 85%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #c9d3df;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      margin-top: 20px;
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2d7ff9;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #1c68d8;
    }
    #result {
      margin-top: 22px;
      font-weight: bold;
      color: green;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login Portal V1</h1>
    <input type="text" placeholder="Username" />
    <input type="password" placeholder="Password" />
    <br />
    <button id="loginBtn" onclick="document.getElementById('result').innerText='Login Success';">
      Login
    </button>
    <div id="result"></div>
  </div>
</body>
</html>
